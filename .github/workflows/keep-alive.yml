name: Supabase Keep-Alive

on:
  schedule:
    # Run every 6 days at midnight UTC to prevent Supabase free-tier pause (7-day inactivity limit)
    - cron: "0 0 */6 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep project alive
        run: |
          echo "Pinging Supabase to prevent inactivity pause..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ibndiciahzodewwqvvpb.supabase.co/rest/v1/rpc/keep_alive" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlibmRpY2lhaHpvZGV3d3F2dnBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjkyNjQsImV4cCI6MjA5MjEwNTI2NH0.d0dtAu_8zzpLDLcuDyAmeXOQssx-_VemDKKv9gcj09I" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlibmRpY2lhaHpvZGV3d3F2dnBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MjkyNjQsImV4cCI6MjA5MjEwNTI2NH0.d0dtAu_8zzpLDLcuDyAmeXOQssx-_VemDKKv9gcj09I" \
            -H "Content-Type: application/json")
          echo "HTTP Status: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase is alive and responding!"
          else
            echo "⚠️ Unexpected status code: $RESPONSE"
            exit 1
          fi
